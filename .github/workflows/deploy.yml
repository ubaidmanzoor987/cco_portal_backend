name: Deploy to EC2

on:
  push:
    branches:
      - master  # Run this workflow when pushing to the master branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "ec2-3-140-243-3.us-east-2.compute.amazonaws.com" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@ec2-3-140-243-3.us-east-2.compute.amazonaws.com 2>&1 << 'EOF'
          set -e
          
          # Define your tmux session names and socket path
          celery_session="1"
          django_session="2"
          tmux_socket="/tmp/tmux-0/default"  # For root user, the socket path will likely be /tmp/tmux-0/default

          # Install system dependencies including LibreOffice
          echo "Updating system packages and installing dependencies..."
          sudo apt update
          sudo apt install -y libreoffice

          # Navigate to the project directory
          cd /home/ubuntu/cco_portal_sria_backend

          # Configure Git to treat the repository as safe
          git config --global --add safe.directory /home/ubuntu/cco_portal_sria_backend

          # Fix ownership of the repository files
          echo "Fixing ownership of repository files..."
          sudo chown -R ubuntu:ubuntu /home/ubuntu/cco_portal_sria_backend

          echo "Pulling the latest changes from the master branch..."
          git pull origin master

          echo "Activating virtual environment and installing dependencies..."
          source /home/ubuntu/cco_portal_sria_backend/venv/bin/activate
          pip install -r requirements.txt

          echo "Running database migrations..."
          python manage.py migrate

          # Stop and restart the Celery worker in its tmux session
          echo "Stopping Celery worker in the tmux session ($celery_session)..."
          sudo tmux -S $tmux_socket send-keys -t $celery_session C-c  # Stop the current Celery process
          sleep 2  # Allow some time for the process to stop

          echo "Starting Celery worker in the tmux session ($celery_session)..."
          sudo tmux -S $tmux_socket send-keys -t $celery_session 'source /home/ubuntu/cco_portal_sria_backend/venv/bin/activate && celery -A conf worker --loglevel=info' C-m

          # Stop and restart the Django server in its tmux session
          echo "Stopping Django server in the tmux session ($django_session)..."
          sudo tmux -S $tmux_socket send-keys -t $django_session C-c  # Stop the current Django server
          sleep 2  # Allow some time for the process to stop

          echo "Starting Django server in the tmux session ($django_session)..."
          sudo tmux -S $tmux_socket send-keys -t $django_session 'source /home/ubuntu/cco_portal_sria_backend/venv/bin/activate && python manage.py runserver 0.0.0.0:8000' C-m

          echo "Deployment completed successfully!"
          EOF
